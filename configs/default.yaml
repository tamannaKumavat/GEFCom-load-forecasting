seed: 42

data:
  raw_dir: data
  target_column: load
  datetime_column: datetime
  freq: h
  load_lags_hours: [168, 336, 504, 672, 8760]
  rolling_windows_hours: [24, 168]
  use_temperature: true

evaluation:
  # Quantiles to predict (1st through 99th percentile)
  quantiles_start: 0.01
  quantiles_end: 0.99
  quantiles_step: 0.01
  # Number of forecasting rounds to use for backtesting
  # Set to null to use all available rounds, or a small int for quick runs
  max_rounds: null
  # Forecast horizon in hours (one month ~ 720h, but varies)
  forecast_horizon_days: 31

baselines:
  seasonal_naive:
    lag_weeks: 1
  climatology:
    lookback_years: null

model:
  name: lightgbm
  objective: regression
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 63
  max_depth: -1
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8

training:
  early_stopping_rounds: 50
  eval_metric: mae

logging:
  log_dir: logs
  checkpoint_dir: checkpoints
  log_every_n_steps: 50
